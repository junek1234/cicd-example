name: CD - Deploy to Minikube using Github Actions

on:
  # Trigger the workflow on push or pull request to the main branch
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  deploy:
    name: Build and Deploy to Minikube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Minikube
        id: minikube
        uses: medyagh/setup-minikube@latest

      - name: Verify Cluster Status
        run: kubectl get pods -A

      - name: Build Docker Image in Minikube
        run: |
          export SHELL=/bin/bash
          eval $(minikube -p minikube docker-env)
          docker build -f ./Dockerfile -t local/cicd-example .
          echo -n "Verifying images: "
          docker images

      - name: Deploy to Minikube
        run: |
          kubectl apply -f deploy.yaml
          kubectl wait --for=condition=Ready pod -l app=cicd-example --timeout=90s
          kubectl get all

      - name: Port-Forward Service
        run: |
          echo "SERVICE_URL=$(minikube service cicd-example --url)"
          # Background the port-forward so the next step can run
          kubectl port-forward service/cicd-example 8080:8080 > /dev/null 2>&1 &
          sleep 5

      - name: Test Application Connectivity
        run: curl -i http://localhost:8080/

      - name: Cleanup
        if: always() # Ensures cleanup runs even if previous steps fail
        run: |
          eval $(minikube docker-env -u)
          minikube delete